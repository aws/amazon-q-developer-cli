[build]
pre-build = ["apt-get update && apt-get --assume-yes install unzip zsh"]

[build.env]
passthrough = [
    "AMAZON_Q_BUILD_TARGET_TRIPLE",
    "AMAZON_Q_BUILD_VARIANT",
    "AMAZON_Q_BUILD_HASH",
    "AMAZON_Q_BUILD_DATETIME",
    "Q_TELEMETRY_CLIENT_ID",
    "BUN_EXECUTABLE_PATH",
    "BUN_RUNTIME_SHA256",
    "TUI_JS_PATH",
    "TUI_JS_SHA256",
]
