[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

ignore = [
  # boxfnonce is obsolete, transitive dep via sacp
  "RUSTSEC-2019-0040",
  # yaml-rust is unmaintained, transitive dep via syntect
  "RUSTSEC-2024-0320",
  # instant is unmaintained, transitive dep via notify-types
  "RUSTSEC-2024-0384",
  # paste is unmaintained, used in core deps
  "RUSTSEC-2024-0436",
  # fxhash is unmaintained, transitive dep via bm25
  "RUSTSEC-2025-0057",
  # number_prefix is unmaintained, transitive dep via indicatif and tokenizers
  "RUSTSEC-2025-0119",
  # rustls-pemfile is unmaintained, migration requires code changes
  "RUSTSEC-2025-0134",
  # bincode v1 is unmaintained, transitive dep via hnsw_rs and syntect
  "RUSTSEC-2025-0141",
]

[licenses]
version = 2
private = { ignore = true }
# licenses should only be approved licences by Amazon, if you
# are unsure please contact a maintainer otherwise other licences
# will be denied
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC-PDDC",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "NCSA",
  "OpenSSL",
  "Unicode-3.0",
  "Zlib",
  "CDLA-Permissive-2.0",
  "bzip2-1.0.6",
]

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

[bans.workspace-dependencies]
duplicates = "allow"
include-path-dependencies = true
unused = "deny"

[[bans.deny]]
name = "openssl"

[[bans.deny]]
name = "git2"

[[bans.deny]]
name = "tempdir"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
