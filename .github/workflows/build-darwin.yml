name: 1.2 Build Darwin (Universal Binary)

on:
  workflow_call:
    inputs:
      channel:
        type: string
        required: true
      build_timestamp:
        type: string
        required: true
      version:
        type: string
        required: true
      release_type:
        type: string
        required: true
      environment:
        type: string
        required: true
      branch_name:
        type: string
        required: true
      commit_sha:
        type: string
        required: true

env:
  AWS_REGION: "us-east-1"
  STAGE_NAME: ${{ inputs.environment }}
  CI: 1

permissions:
  id-token: write
  contents: read

jobs:
  notarize-bun:
    name: Notarize Bun (${{ inputs.environment }})
    runs-on: macos-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Configure environment from secrets
        run: |
          {
            echo "AWS_GITHUB_ACTIONS_ROLE_ARN=${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}"
            echo "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}"
            echo "SIGNING_BUCKET_NAME=${{ secrets.SIGNING_BUCKET_NAME }}"
          } >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 7200

      - name: Download, notarize and upload bun (per-arch)
        env:
          SIGNING_BUCKET_NAME: ${{ secrets.SIGNING_BUCKET_NAME }}
          SIGNING_ROLE_ARN: ${{ secrets.SIGNING_ROLE_ARN }}
          SIGNING_APPLE_NOTARIZING_SECRET_ARN: ${{ secrets.SIGNING_APPLE_NOTARIZING_SECRET_ARN }}
        run: |
          python3 ./scripts/main.py sign-bun-per-arch \
            --branch-name "${{ inputs.branch_name }}" \
            --commit-sha "${{ inputs.commit_sha }}"

  build-darwin-arch:
    name: Build Darwin ${{ matrix.arch }} (${{ inputs.environment }})
    needs: notarize-bun
    runs-on: macos-latest
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-darwin
            bun_arch: x64
          - arch: aarch64
            target: aarch64-apple-darwin
            bun_arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Configure environment from secrets
        run: |
          {
            echo "AWS_GITHUB_ACTIONS_ROLE_ARN=${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}"
            echo "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}"
            echo "SIGNING_BUCKET_NAME=${{ secrets.SIGNING_BUCKET_NAME }}"
          } >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Rust dependencies
        if: inputs.branch_name != 'prod'
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 7200

      - name: Download notarized bun (per-arch)
        run: |
          BRANCH_NAME="${{ inputs.branch_name }}"
          COMMIT_ID="${{ inputs.commit_sha }}"
          mkdir -p build/bun
          aws s3 cp "s3://${{ env.SIGNING_BUCKET_NAME }}/${BRANCH_NAME}/notarized-bun/${COMMIT_ID}/bun-${{ matrix.bun_arch }}" build/bun/bun-${{ matrix.bun_arch }}-notarized
          chmod +x build/bun/bun-${{ matrix.bun_arch }}-notarized
          # Set both env vars — the build script expects per-arch bun paths.
          # Only the one matching this arch will actually be embedded.
          if [ "${{ matrix.bun_arch }}" = "x64" ]; then
            echo "BUN_EXECUTABLE_PATH_X86_64=$(pwd)/build/bun/bun-x64-notarized" >> "$GITHUB_ENV"
          else
            echo "BUN_EXECUTABLE_PATH_AARCH64=$(pwd)/build/bun/bun-aarch64-notarized" >> "$GITHUB_ENV"
          fi
          echo "✓ Downloaded notarized bun binary (${{ matrix.bun_arch }})"

      - name: Download autodocs embeddings
        uses: actions/download-artifact@v4
        with:
          pattern: autodocs-embeddings-*
          merge-multiple: true

      - name: Build macOS ${{ matrix.arch }} binary
        env:
          AMAZON_Q_BUILD_TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          python3 ./scripts/main.py build \
            --skip-lints --skip-tests --skip-autodocs-embeddings \
            --stage-name "${{ env.STAGE_NAME }}"

      - name: Upload ${{ matrix.arch }} binary
        uses: actions/upload-artifact@v4
        with:
          name: darwin-bin-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/chat_cli
          retention-days: 1

  merge-darwin:
    name: Merge Darwin Universal Binary (${{ inputs.environment }})
    needs: build-darwin-arch
    runs-on: macos-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Configure environment from secrets
        run: |
          {
            echo "AWS_GITHUB_ACTIONS_ROLE_ARN=${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}"
            echo "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}"
            echo "BUILD_OUTPUT_BUCKET=${{ secrets.BUILD_OUTPUT_BUCKET }}"
            echo "SIGNING_BUCKET_NAME=${{ secrets.SIGNING_BUCKET_NAME }}"
          } >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 7200

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: darwin-bin-x86_64
          path: darwin-bin-x86_64

      - name: Download aarch64 binary
        uses: actions/download-artifact@v4
        with:
          name: darwin-bin-aarch64
          path: darwin-bin-aarch64

      - name: Make binaries executable
        run: |
          chmod +x darwin-bin-x86_64/chat_cli
          chmod +x darwin-bin-aarch64/chat_cli

      - name: Merge, sign, and package universal binary
        env:
          SIGNING_BUCKET_NAME: ${{ secrets.SIGNING_BUCKET_NAME }}
          SIGNING_ROLE_ARN: ${{ secrets.SIGNING_ROLE_ARN }}
          SIGNING_APPLE_NOTARIZING_SECRET_ARN: ${{ secrets.SIGNING_APPLE_NOTARIZING_SECRET_ARN }}
        run: |
          python3 ./scripts/main.py merge-darwin \
            --x86_64-binary=./darwin-bin-x86_64/chat_cli \
            --aarch64-binary=./darwin-bin-aarch64/chat_cli

      - name: Upload artifacts to S3
        run: |
          echo "Uploading build artifacts to S3..."
          BRANCH_NAME="${{ inputs.branch_name }}"
          COMMIT_ID="${{ inputs.commit_sha }}"
          TARGET="universal-apple-darwin"
          S3_PATH_COMMIT="chat/${BRANCH_NAME}/${COMMIT_ID}/${TARGET}"
          S3_PATH_LATEST="chat/${BRANCH_NAME}/latest/${TARGET}"
          
          if [ -f "build/kiro-cli-chat.zip" ] && [ -f "build/kiro-cli-chat.zip.sha256" ]; then
              aws s3 cp build/kiro-cli-chat.zip "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/"
              aws s3 cp build/kiro-cli-chat.zip.sha256 "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/"
              echo "✓ Uploaded to s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/"
              
              aws s3 cp build/kiro-cli-chat.zip "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/"
              aws s3 cp build/kiro-cli-chat.zip.sha256 "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/"
              echo "✓ Uploaded to s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/"
          else
              echo "❌ Build artifacts not found in build/ directory"
              exit 1
          fi
