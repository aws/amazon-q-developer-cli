name: 1.2 Build Darwin (Universal Binary)

on:
  workflow_call:
    inputs:
      channel:
        type: string
        required: true
      build_timestamp:
        type: string
        required: true
      version:
        type: string
        required: true
      release_type:
        type: string
        required: true
      environment:
        type: string
        required: true
      trigger_autocomplete_build:
        type: boolean
        required: false
        default: false

env:
  AWS_REGION: "us-east-1"
  STAGE_NAME: ${{ inputs.environment }}
  CI: 1

permissions:
  id-token: write
  contents: read

jobs:
  build-darwin:
    name: Build Darwin Universal Binary (${{ inputs.environment }})
    runs-on: macos-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure environment from secrets
        run: |
          {
            echo "AWS_GITHUB_ACTIONS_ROLE_ARN=${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}"
            echo "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}"
            echo "BUILD_OUTPUT_BUCKET=${{ secrets.BUILD_OUTPUT_BUCKET }}"
          } >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build macOS Universal Binary
        run: |
          python3 ./scripts/main.py build \
            --skip-lints --skip-tests \
            --stage-name "${{ env.STAGE_NAME }}"

      - name: Upload artifacts to S3
        run: |
          echo "Uploading build artifacts to S3..."
          BRANCH_NAME="${{ github.ref_name }}"
          COMMIT_ID="${{ github.sha }}"
          TARGET="universal-apple-darwin"
          S3_PATH_COMMIT="chat/${BRANCH_NAME}/${COMMIT_ID}/${TARGET}"
          S3_PATH_LATEST="chat/${BRANCH_NAME}/latest/${TARGET}"
          
          if [ -f "build/kiro-cli-chat.zip" ] && [ -f "build/kiro-cli-chat.zip.sha256" ]; then
              aws s3 cp build/kiro-cli-chat.zip "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/"
              aws s3 cp build/kiro-cli-chat.zip.sha256 "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/"
              echo "✓ Uploaded to s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/"
              
              aws s3 cp build/kiro-cli-chat.zip "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/"
              aws s3 cp build/kiro-cli-chat.zip.sha256 "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/"
              echo "✓ Uploaded to s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/"
          else
              echo "❌ Build artifacts not found in build/ directory"
              exit 1
          fi

  trigger-autocomplete-build:
    name: Trigger Autocomplete Build
    needs: build-darwin
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: inputs.trigger_autocomplete_build == true && inputs.environment == 'gamma'
    steps:
      - name: Trigger Autocomplete Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOCOMPLETE_TRIGGER_TOKEN }}
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: 'kiro-team',
              repo: 'kiro-cli-autocomplete',
              workflow_id: 'build-kiro-cli.yml',
              ref: '${{ github.ref_name }}',
              inputs: {
                version_increment: 'none',
                release_quality: '${{ inputs.channel }}',
                chat_binary_commit: 'latest'
              }
            })
