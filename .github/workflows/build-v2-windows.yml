name: 2.3 Build V2 Windows

on:
  workflow_call:
    inputs:
      channel:
        type: string
        required: true
      build_timestamp:
        type: string
        required: true
      version:
        type: string
        required: true
      release_type:
        type: string
        required: true
      environment:
        type: string
        required: true
      branch_name:
        type: string
        required: true
      commit_sha:
        type: string
        required: true

env:
  AWS_REGION: "us-east-1"
  STAGE_NAME: ${{ inputs.environment }}
  CI: 1

permissions:
  id-token: write
  contents: read

jobs:
  build-windows:
    name: Build V2 Windows (${{ matrix.target }}, ${{ inputs.environment }})
    runs-on: ${{ matrix.runner }}
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-2019
            arch: x64
            build_installers: true
          - target: aarch64-pc-windows-msvc
            runner: windows-2019
            arch: arm64
            build_installers: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Configure environment from secrets
        shell: bash
        run: |
          {
            echo "AWS_GITHUB_ACTIONS_ROLE_ARN=${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}"
            echo "BUILD_OUTPUT_BUCKET=${{ secrets.BUILD_OUTPUT_BUCKET }}"
          } >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 7200

      - name: Build V2 Windows Binary
        shell: bash
        env:
          AMAZON_Q_BUILD_TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          python3 ./scripts/main_v2.py build \
            --skip-lints --skip-tests \
            --stage-name "${{ env.STAGE_NAME }}"

      - name: Smoke test (x64 only)
        if: matrix.arch == 'x64'
        shell: bash
        run: |
          if [ -f "build/kiro-cli-chat.exe" ]; then
            ./build/kiro-cli-chat.exe --version
            echo "✓ Smoke test passed"
          else
            echo "❌ Binary not found for smoke test"
            exit 1
          fi

      - name: Build setup.exe installer
        if: matrix.build_installers
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          Write-Host "Building setup.exe for version $version"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DVersion=$version "windows-installer\setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup build failed" }
          Write-Host "✓ Created windows-installer\output\kiro-cli-setup-${version}.exe"

      - name: Build MSI installer
        if: matrix.build_installers
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $wixVersion = "$version.0"
          $binaryPath = (Resolve-Path "build\kiro-cli-chat.exe").Path
          $cliVersion = "v2"
          Write-Host "Building MSI for version $wixVersion (CLI version: $cliVersion)"
          Write-Host "Binary: $binaryPath"

          dotnet tool install --global wix
          wix extension add WixToolset.UI.wixext/6.0.0 --global

          New-Item -ItemType Directory -Force -Path "windows-installer\output" | Out-Null

          wix build windows-installer\Product.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -d ProductVersion=$wixVersion `
            -d BinarySource=$binaryPath `
            -d DefaultCliVersion=$cliVersion `
            -b windows-installer `
            -o "windows-installer\output\kiro-cli-${version}.msi"

          if ($LASTEXITCODE -ne 0) { throw "WiX build failed" }
          Write-Host "✓ Created windows-installer\output\kiro-cli-${version}.msi"

      - name: Upload artifacts to S3
        shell: bash
        run: |
          BRANCH_NAME="${{ inputs.branch_name }}"
          COMMIT_ID="${{ inputs.commit_sha }}"
          TARGET="${{ matrix.target }}"
          S3_PATH_COMMIT="chat/${BRANCH_NAME}/${COMMIT_ID}/${TARGET}"
          S3_PATH_LATEST="chat/${BRANCH_NAME}/latest/${TARGET}"

          # Upload main build artifacts
          if [ -d "build" ] && [ "$(ls -A build)" ]; then
              aws s3 cp build/ "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/" --recursive
              echo "✓ Uploaded to s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/"

              aws s3 cp build/ "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/" --recursive
              echo "✓ Uploaded to s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/"
          else
              echo "❌ Build directory not found or empty"
              exit 1
          fi

          # Upload installers if built
          if [ -d "windows-installer/output" ] && [ "$(ls -A windows-installer/output 2>/dev/null)" ]; then
            aws s3 cp windows-installer/output/ "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/installers/" --recursive
            aws s3 cp windows-installer/output/ "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/installers/" --recursive
            echo "✓ Uploaded installers"
          fi
