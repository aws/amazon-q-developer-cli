name: "PR: TUI"

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

env:
  CI: 1

jobs:
  check-paths:
    name: Check if TUI files changed
    runs-on: ubuntu-latest
    outputs:
      tui-changed: ${{ steps.filter.outputs.tui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tui:
              - 'packages/tui/**'
              - '.github/workflows/tui.yml'

  tui-typecheck:
    name: Typecheck
    needs: check-paths
    if: needs.check-paths.outputs.tui-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: packages/tui
      - name: Typecheck
        run: bun run typecheck
        working-directory: packages/tui

  tui-lint:
    name: Lint
    needs: check-paths
    if: needs.check-paths.outputs.tui-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: packages/tui
      - name: Lint
        run: bun run lint
        working-directory: packages/tui

  tui-test:
    name: Unit Tests
    needs: check-paths
    if: needs.check-paths.outputs.tui-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: packages/tui
      - name: Run tests
        run: bun test
        working-directory: packages/tui

  tui-e2e:
    name: E2E Tests (${{ matrix.os }})
    needs: check-paths
    if: needs.check-paths.outputs.tui-changed == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y -qq build-essential pkg-config jq dpkg curl wget zstd cmake clang libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libdbus-1-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev valac libibus-1.0-dev libglib2.0-dev sqlite3 libxdo-dev protobuf-compiler libfuse2

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-e2e-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build chat_cli_v2
        run: cargo build -p chat_cli_v2

      - uses: oven-sh/setup-bun@v2

      - name: Install TUI dependencies
        run: bun install
        working-directory: packages/tui

      - name: Build TUI
        run: bun run build
        working-directory: packages/tui

      - name: Run E2E tests
        run: bun test ./e2e_tests/
        working-directory: packages/tui
