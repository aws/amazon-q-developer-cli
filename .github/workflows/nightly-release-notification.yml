name: Nightly Release Notification

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      build_timestamp:
        required: true
        type: string
      branch_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
      build_timestamp:
        required: true
        type: string
      branch_name:
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare_message:
    name: Prepare Notification
    runs-on: ubuntu-latest
    outputs:
      message: ${{ steps.build-message.outputs.message }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch_name }}

      - name: Get Commits Since Last Nightly
        id: get-commits
        run: |
          # Get current tag (just created) and previous tag
          CURRENT_TAG=$(git tag -l 'chat-v*-nightly.*' --sort=-v:refname | head -1)
          LAST_TAG=$(git tag -l 'chat-v*-nightly.*' --sort=-v:refname | head -2 | tail -1)
          if [[ -z "$LAST_TAG" ]]; then
            COMMITS=$(git log --format="• %h %s (%an)" -10 | grep -v "Sync: Merge main into nightly")
          else
            COMMITS=$(git log ${LAST_TAG}..${CURRENT_TAG} --format="• %h %s (%an)" | grep -v "Sync: Merge main into nightly")
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract User-Facing Messages
        id: user-facing
        run: |
          CURRENT_TAG=$(git tag -l 'chat-v*-nightly.*' --sort=-v:refname | head -1)
          LAST_TAG=$(git tag -l 'chat-v*-nightly.*' --sort=-v:refname | head -2 | tail -1)
          if [[ -z "$LAST_TAG" ]]; then
            RANGE="HEAD~10..HEAD"
          else
            RANGE="${LAST_TAG}..${CURRENT_TAG}"
          fi
          
          USER_FACING=""
          while IFS= read -r commit; do
            MSG=$(git log -1 --format=%B "$commit")
            if echo "$MSG" | grep -q "^User-facing:"; then
              TITLE=$(git log -1 --format=%s "$commit")
              UF_MSG=$(echo "$MSG" | sed -n '/^User-facing:/,/^$/p' | sed 's/^User-facing: *//' | tr '\n' ' ' | sed 's/  */ /g')
              if [[ -n "$UF_MSG" ]]; then
                USER_FACING="${USER_FACING}• ${TITLE}: ${UF_MSG}"$'\n'
              fi
            fi
          done < <(git rev-list "$RANGE" | grep -v "$(git log --format=%H --grep='Sync: Merge main into nightly' "$RANGE")")
          
          echo "messages<<EOF" >> $GITHUB_OUTPUT
          echo "$USER_FACING" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Format Timestamp
        id: format-timestamp
        run: |
          TS="${{ inputs.build_timestamp }}"
          YEAR="${TS:0:4}"
          MONTH="${TS:4:2}"
          DAY="${TS:6:2}"
          HOUR="${TS:8:2}"
          MIN="${TS:10:2}"
          READABLE=$(TZ='America/Los_Angeles' date -d "${YEAR}-${MONTH}-${DAY} ${HOUR}:${MIN} UTC" "+%B %d, %Y at %I:%M %p PST")
          echo "readable=$READABLE" >> $GITHUB_OUTPUT

      - name: Build Message
        id: build-message
        env:
          COMMITS: ${{ steps.get-commits.outputs.commits }}
          USER_FACING: ${{ steps.user-facing.outputs.messages }}
        run: |
          jq -n \
            --arg message "🌙 New Kiro CLI nightly version released!" \
            --arg version "${{ inputs.version }}" \
            --arg timestamp "${{ steps.format-timestamp.outputs.readable }}" \
            --arg branch "${{ inputs.branch_name }}" \
            --arg commits "$COMMITS" \
            --arg user_facing "$USER_FACING" \
            '{
              message: $message,
              version: $version,
              build_timestamp: $timestamp,
              branch_name: $branch,
              commits: $commits,
              user_facing: $user_facing
            }' > message.json
          echo "message<<JSONEOF" >> $GITHUB_OUTPUT
          cat message.json >> $GITHUB_OUTPUT
          echo "JSONEOF" >> $GITHUB_OUTPUT

  notify:
    name: Send Notification
    needs: prepare_message
    uses: ./.github/workflows/notify-slack.yml
    secrets:
      WEBHOOK_URL: ${{ secrets.SLACK_NIGHTLY_WEBHOOK_URL }}
    with:
      message: ${{ needs.prepare_message.outputs.message }}
