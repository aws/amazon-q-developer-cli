name: 1.3 Build Windows

on:
  workflow_call:
    inputs:
      channel:
        type: string
        required: true
      build_timestamp:
        type: string
        required: true
      version:
        type: string
        required: true
      release_type:
        type: string
        required: true
      environment:
        type: string
        required: true
      branch_name:
        type: string
        required: true
      commit_sha:
        type: string
        required: true

env:
  AWS_REGION: "us-east-1"
  STAGE_NAME: ${{ inputs.environment }}
  CI: 1

permissions:
  id-token: write
  contents: read

jobs:
  build-windows:
    name: Build Windows (${{ matrix.target }}, ${{ inputs.environment }})
    runs-on: ${{ matrix.runner }}
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            arch: x64
            build_installers: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Configure environment from secrets
        shell: bash
        run: |
          {
            echo "AWS_GITHUB_ACTIONS_ROLE_ARN=${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}"
            echo "BUILD_OUTPUT_BUCKET=${{ secrets.BUILD_OUTPUT_BUCKET }}"
            echo "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}"
          } >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 7200

      - name: Setup Python (for V2 build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (for V2 build)
        run: pip install -r scripts/requirements.txt

      - name: Setup Bun (for V2 build)
        uses: oven-sh/setup-bun@v2

      - name: Build V2 Windows Binary with TUI/Bun embedding
        shell: bash
        env:
          AMAZON_Q_BUILD_TARGET_TRIPLE: ${{ matrix.target }}
        run: |
          python3 ./scripts/main.py build \
            --skip-lints --skip-tests \
            --stage-name "${{ env.STAGE_NAME }}"

      - name: Create signing helper script
        if: matrix.arch == 'x64'
        shell: bash
        run: |
          cat > /tmp/sign-artifact.sh << 'SIGNEOF'
          #!/bin/bash
          set -e
          FILE_PATH="$1"
          UNSIGNED_BUCKET="kiro-cli-win-unsigned-${AWS_ACCOUNT_ID}"
          SIGNED_BUCKET="kiro-cli-win-signed-${AWS_ACCOUNT_ID}"
          PROFILE_ID="KiroCliAuthenticode"
          PLATFORM="AuthenticodeSigner-SHA256-RSA"
          FILENAME=$(basename "$FILE_PATH")
          S3_KEY="${PROFILE_ID}/${PLATFORM}/${FILENAME}"

          # Assume the signing role fresh each time
          CREDS=$(aws sts assume-role \
            --role-arn "arn:aws:iam::${AWS_ACCOUNT_ID}:role/KiroCli-ArtifactAccessRole" \
            --role-session-name "WindowsSigning" \
            --external-id "KiroCli" \
            --region us-east-1 \
            --output json)
          export AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r .Credentials.AccessKeyId)
          export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r .Credentials.SecretAccessKey)
          export AWS_SESSION_TOKEN=$(echo $CREDS | jq -r .Credentials.SessionToken)

          echo "🔏 Signing ${FILENAME}..."
          aws s3 cp "${FILE_PATH}" "s3://${UNSIGNED_BUCKET}/${S3_KEY}" --region us-east-1

          echo "  Waiting for signing job..."
          JOB_ID=""
          for i in $(seq 1 60); do
            JOB_ID=$(aws s3api get-object-tagging \
              --bucket "${UNSIGNED_BUCKET}" --key "${S3_KEY}" --region us-east-1 \
              --query "TagSet[?Key=='signer-job-id'].Value" --output text 2>/dev/null || true)
            if [ -n "$JOB_ID" ] && [ "$JOB_ID" != "None" ]; then
              echo "  ✓ Job started: ${JOB_ID}"
              break
            fi
            sleep 5
          done
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" == "None" ]; then
            echo "  ❌ Signing job did not start within timeout"
            exit 1
          fi

          SIGNED_KEY="${PROFILE_ID}/${PLATFORM}/${FILENAME}-${JOB_ID}"
          echo "  Waiting for signed artifact..."
          for i in $(seq 1 60); do
            if aws s3 ls "s3://${SIGNED_BUCKET}/${SIGNED_KEY}" --region us-east-1 2>/dev/null; then
              echo "  ✓ Signed artifact ready"
              break
            fi
            sleep 5
          done

          aws s3 cp "s3://${SIGNED_BUCKET}/${SIGNED_KEY}" "${FILE_PATH}" --region us-east-1
          echo "  ✓ ${FILENAME} signed successfully"
          SIGNEOF
          chmod +x /tmp/sign-artifact.sh

      - name: Sign Binary (Authenticode)
        if: matrix.arch == 'x64'
        shell: bash
        run: /tmp/sign-artifact.sh "build/kiro-cli-chat.exe"

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p build
          TARGET="${{ matrix.target }}"
          SRC="build/kiro-cli-chat.exe"

          if [ ! -f "$SRC" ]; then
            echo "❌ Binary not found at ${SRC}"
            exit 1
          fi

          cp "$SRC" "build/kiro-cli.exe"

          cd build
          7z a "kiro-cli-chat-${TARGET}.zip" "kiro-cli.exe"
          sha256sum "kiro-cli-chat-${TARGET}.zip" > "kiro-cli-chat-${TARGET}.zip.sha256"
          echo "✓ Packaged kiro-cli-chat-${TARGET}.zip"

      - name: Build MSI installer
        if: matrix.build_installers
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $wixVersion = "$version.0"
          $arch = "${{ matrix.arch }}"
          $binaryPath = (Resolve-Path "build\kiro-cli-chat.exe").Path
          $cliVersion = "v2"

          Write-Host "Building MSI for $arch version $wixVersion (CLI version: $cliVersion)"

          dotnet tool install --global wix 2>$null
          wix extension add WixToolset.UI.wixext/6.0.2 --global 2>$null

          New-Item -ItemType Directory -Force -Path "windows-installer\output" | Out-Null

          wix build windows-installer\Product.wxs `
            -arch $arch `
            -ext WixToolset.UI.wixext `
            -d ProductVersion=$wixVersion `
            -d BinarySource=$binaryPath `
            -d DefaultCliVersion=$cliVersion `
            -b windows-installer `
            -o "windows-installer\output\kiro-cli-${version}-${arch}.msi"

          if ($LASTEXITCODE -ne 0) { throw "WiX build failed" }
          Write-Host "✓ Created windows-installer\output\kiro-cli-${version}-${arch}.msi"

      - name: Sign MSI installer (Authenticode)
        if: matrix.build_installers && matrix.arch == 'x64'
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          ARCH="${{ matrix.arch }}"
          /tmp/sign-artifact.sh "windows-installer/output/kiro-cli-${VERSION}-${ARCH}.msi"

      - name: Re-authenticate AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Upload artifacts to S3
        shell: bash
        run: |
          BRANCH_NAME="${{ inputs.branch_name }}"
          COMMIT_ID="${{ inputs.commit_sha }}"
          TARGET="${{ matrix.target }}"
          ARCH="${{ matrix.arch }}"
          S3_PATH_COMMIT="chat/${BRANCH_NAME}/${COMMIT_ID}/${TARGET}"
          S3_PATH_LATEST="chat/${BRANCH_NAME}/latest/${TARGET}"

          aws s3 cp "build/kiro-cli-chat-${TARGET}.zip" "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/"
          aws s3 cp "build/kiro-cli-chat-${TARGET}.zip.sha256" "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/"

          aws s3 cp "build/kiro-cli-chat-${TARGET}.zip" "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/"
          aws s3 cp "build/kiro-cli-chat-${TARGET}.zip.sha256" "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/"

          # Upload MSI installer
          if [ -d "windows-installer/output" ] && [ "$(ls -A windows-installer/output 2>/dev/null)" ]; then
            rm -f windows-installer/output/*.wixpdb
            echo "Uploading installers:"
            ls -la windows-installer/output/
            aws s3 cp windows-installer/output/ "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/installers/" --recursive
            aws s3 cp windows-installer/output/ "s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_LATEST}/installers/" --recursive
            echo "✓ Uploaded MSI installer"
          fi

          echo "✓ Uploaded to s3://${{ env.BUILD_OUTPUT_BUCKET }}/${S3_PATH_COMMIT}/"
