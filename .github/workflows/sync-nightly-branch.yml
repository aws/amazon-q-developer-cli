name: Sync Nightly Branch with Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync Nightly Branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: nightly
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge Main into Nightly
        run: |
          # Fetch latest main
          git fetch origin main
          
          # Version files that nightly bumps — safe to auto-resolve by taking main's version
          VERSION_FILES="Cargo.toml|Cargo.lock|packages/tui/package.json"
          
          # Merge main into nightly, preferring main's version on conflicts
          git merge origin/main -m "Sync: Merge main into nightly" || {
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            
            # Check if all conflicts are in version files
            if echo "$CONFLICTS" | grep -qvE "^($VERSION_FILES)$"; then
              echo "❌ Merge conflict in non-version files:"
              echo "$CONFLICTS" | grep -vE "^($VERSION_FILES)$"
              git merge --abort
              exit 1
            fi
            
            echo "Version file conflicts detected - taking main's version"
            echo "$CONFLICTS" | xargs git checkout --theirs
            echo "$CONFLICTS" | xargs git add
            git commit -m "Sync: Merge main into nightly (resolved version conflicts)"
          }
          
          # Push to nightly
          git push origin nightly
          
          echo "✅ Nightly branch synced with main"
