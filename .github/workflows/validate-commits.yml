name: Validate Commit Messages

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changelog fragments
        run: |
          # Get all files changed in the PR
          FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD)
          
          HAS_CRATES_CHANGES=false
          HAS_FRAGMENT=false
          IS_ALL_CHORE=true
          
          # Check if PR touches crates/
          if echo "$FILES" | grep -q '^crates/'; then
            HAS_CRATES_CHANGES=true
            
            # Check commit types
            COMMITS=$(git log --format=%H origin/${{ github.base_ref }}..HEAD)
            for COMMIT in $COMMITS; do
              MSG=$(git log --format=%B -n 1 $COMMIT)
              if ! echo "$MSG" | grep -qE "^(chore|test|docs):"; then
                IS_ALL_CHORE=false
                break
              fi
            done
          fi
          
          # Check if PR adds any fragments
          if echo "$FILES" | grep -q '^\.changes/unreleased/.*\.json$'; then
            HAS_FRAGMENT=true
          fi
          
          # Require fragment if PR has user-facing crates/ changes
          if [ "$HAS_CRATES_CHANGES" = true ] && [ "$IS_ALL_CHORE" = false ] && [ "$HAS_FRAGMENT" = false ]; then
            echo "❌ Missing changelog fragment"
            echo "   If applicable, add a changelog fragment for user-facing changes"
            echo "   Run: ./scripts/new-change.sh <type> \"<description>\""
            echo "   Types: added, changed, deprecated, removed, fixed, security"
            exit 1
          fi
          
          echo "✅ Changelog fragment check complete"
