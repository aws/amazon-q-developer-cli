name: 1.0 Build Kiro CLI Chat (All Platforms)
on:
  workflow_dispatch:
    inputs:
      version_increment:
        description: "Release Version Increment"
        default: "none"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none
      release_quality:
        description: "Specify the release quality"
        type: choice
        required: true
        default: "insider"
        options:
          - stable
          - nightly
          - insider
      trigger_autocomplete_build:
        description: 'Trigger autocomplete build after Darwin build succeeds'
        type: boolean
        required: false
        default: true
  schedule:
    - cron: "21 6 * * *"
  push:
    branches:
      - prod
      - main
      - feature/*

env:
  AWS_REGION: "us-east-1"
  VERSION_INCREMENT: ${{ github.event.inputs.version_increment || (github.event_name == 'schedule' && 'patch') || 'none' }}
  RELEASE_QUALITY: ${{ github.event.inputs.release_quality || (github.event_name == 'schedule' && 'nightly') || (github.ref_name == 'beta' && 'insider') || 'insider' }}

permissions:
  id-token: write
  contents: write
  actions: write

concurrency:
  group: kiro-cli-version-management-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check_nightly_skip:
    name: Check if Nightly Should Skip
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check Last Commit
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ env.RELEASE_QUALITY }}" == "nightly" ]]; then
            IS_NIGHTLY_COMMIT=$(python3 .github/scripts/check_nightly_skip.py)
            if [[ "$IS_NIGHTLY_COMMIT" == "true" ]]; then
              echo "should_skip=true" >> $GITHUB_OUTPUT
              echo "⏭️ Skipping nightly build - last commit was from previous nightly build"
            else
              echo "should_skip=false" >> $GITHUB_OUTPUT
              echo "Proceeding with nightly build"
            fi
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

  determine_branch:
    name: Determine Working Branch
    needs: check_nightly_skip
    if: needs.check_nightly_skip.outputs.should_skip == 'false'
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.set-branch.outputs.BRANCH_NAME }}
    steps:
      - name: Set Working Branch
        id: set-branch
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ env.RELEASE_QUALITY }}" == "nightly" ]]; then
            echo "BRANCH_NAME=nightly" >> $GITHUB_OUTPUT
          else
            echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

  generate_timestamp:
    name: Generate Build Timestamp
    needs: [check_nightly_skip, determine_branch]
    if: needs.check_nightly_skip.outputs.should_skip == 'false'
    runs-on: ubuntu-latest
    outputs:
      build_timestamp: ${{ steps.generate-timestamp.outputs.BUILD_TIMESTAMP }}
    steps:
      - name: Generate Build Timestamp
        id: generate-timestamp
        run: |
          BUILD_TIMESTAMP=$(date +%Y%m%d%H%M)
          echo "BUILD_TIMESTAMP=$BUILD_TIMESTAMP" >> $GITHUB_OUTPUT
          echo "Generated centralized build timestamp: $BUILD_TIMESTAMP"

  ValidateReleaseTrigger:
    name: Validate Release Trigger
    runs-on: ubuntu-latest
    needs: [check_nightly_skip, determine_branch]
    if: needs.check_nightly_skip.outputs.should_skip == 'false'
    outputs:
      should_proceed: ${{ steps.validate.outputs.should_proceed }}
      release_type: ${{ steps.validate.outputs.release_type }}
    steps:
      - name: Validate Release Conditions
        id: validate
        run: |
          echo "=== VALIDATING RELEASE TRIGGER ==="
          echo "Event: ${{ github.event_name }}"
          echo "Working Branch: ${{ needs.determine_branch.outputs.branch_name }}"
          echo "Release Quality: ${{ env.RELEASE_QUALITY }}"
          
          SHOULD_PROCEED="true"
          RELEASE_TYPE=""
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ env.RELEASE_QUALITY }}" == "stable" ]]; then
              RELEASE_TYPE="stable-manual"
            elif [[ "${{ env.RELEASE_QUALITY }}" == "insider" ]]; then
              RELEASE_TYPE="insider-manual"
            elif [[ "${{ env.RELEASE_QUALITY }}" == "nightly" ]]; then
              RELEASE_TYPE="nightly-manual"
            fi
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            RELEASE_TYPE="nightly-scheduled"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            RELEASE_TYPE="insider-auto"
          else
            SHOULD_PROCEED="false"
          fi
          
          echo "should_proceed=$SHOULD_PROCEED" >> $GITHUB_OUTPUT
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT

  UpdateVersionNumber:
    name: Update Version Number
    runs-on: ubuntu-latest
    needs: [check_nightly_skip, determine_branch, ValidateReleaseTrigger, generate_timestamp]
    if: needs.check_nightly_skip.outputs.should_skip == 'false' && needs.ValidateReleaseTrigger.outputs.should_proceed == 'true'
    outputs:
      branch_name: ${{ needs.determine_branch.outputs.branch_name }}
      build_timestamp: ${{ needs.generate_timestamp.outputs.build_timestamp }}
      version: ${{ steps.get-version.outputs.VERSION }}
      release_type: ${{ needs.ValidateReleaseTrigger.outputs.release_type }}
      release_quality: ${{ steps.set-release-quality.outputs.RELEASE_QUALITY }}
      environment: ${{ steps.determine-environment.outputs.ENVIRONMENT }}
      commit_sha: ${{ steps.get-commit-sha.outputs.COMMIT_SHA }}
      version_updated: ${{ steps.update-version.outcome == 'success' }}
    steps:
      - name: Set Release Quality Output
        id: set-release-quality
        run: echo "RELEASE_QUALITY=${{ env.RELEASE_QUALITY }}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.determine_branch.outputs.branch_name }}

      - name: Log Workflow Inputs
        run: |
          echo "=== KIRO CLI CHAT RELEASE WORKFLOW STARTED ==="
          echo "Working Branch: ${{ needs.determine_branch.outputs.branch_name }}"
          echo "Event: ${{ github.event_name }}"
          echo "Release Type: ${{ needs.ValidateReleaseTrigger.outputs.release_type }}"
          echo "Version Increment: ${{ env.VERSION_INCREMENT }}"
          echo "Release Quality: ${{ env.RELEASE_QUALITY }}"

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Rust
        if: env.RELEASE_QUALITY == 'nightly' || env.VERSION_INCREMENT != 'none'
        uses: dtolnay/rust-toolchain@stable

      - name: Update Version Number
        id: update-version
        if: env.RELEASE_QUALITY == 'nightly' || env.VERSION_INCREMENT != 'none'
        run: |
          CURRENT_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          
          # For nightly, always use patch increment (script handles the logic)
          INCREMENT="${{ env.VERSION_INCREMENT }}"
          if [[ "${{ env.RELEASE_QUALITY }}" == "nightly" ]]; then
            INCREMENT="patch"
          fi
          
          NEW_VERSION=$(python3 .github/scripts/bump_version.py "$CURRENT_VERSION" "$INCREMENT" "${{ env.RELEASE_QUALITY }}")
          
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" Cargo.toml
          cargo update --workspace
          git add Cargo.toml Cargo.lock
          git commit -m "Release: Bump version to $NEW_VERSION (${{ env.RELEASE_QUALITY }})"
          git push origin HEAD

      - name: Get Current Version
        id: get-version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        if: env.RELEASE_QUALITY == 'nightly' || env.VERSION_INCREMENT != 'none'
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="chat-v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed git tag: $TAG"

      - name: Capture Commit SHA
        id: get-commit-sha
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "Final commit SHA: $COMMIT_SHA"

      - name: Determine Environment
        id: determine-environment
        run: |
          BRANCH="${{ needs.determine_branch.outputs.branch_name }}"
          if [[ "$BRANCH" == "prod" ]] || [[ "$BRANCH" == "main" ]]; then
            echo 'ENVIRONMENT=["gamma", "prod"]' >> $GITHUB_OUTPUT
          else
            echo 'ENVIRONMENT=["gamma"]' >> $GITHUB_OUTPUT
          fi

  TriggerDarwinBuild:
    needs: [check_nightly_skip, determine_branch, UpdateVersionNumber]
    if: needs.check_nightly_skip.outputs.should_skip == 'false'
    name: Trigger Darwin Universal Build (${{ matrix.environment }})
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.UpdateVersionNumber.outputs.environment) }}
    uses: ./.github/workflows/build-darwin.yml
    secrets: inherit
    with:
      channel: ${{ needs.UpdateVersionNumber.outputs.release_quality }}
      build_timestamp: ${{ needs.UpdateVersionNumber.outputs.build_timestamp }}
      version: ${{ needs.UpdateVersionNumber.outputs.version }}
      release_type: ${{ needs.UpdateVersionNumber.outputs.release_type }}
      environment: ${{ matrix.environment }}
      branch_name: ${{ needs.UpdateVersionNumber.outputs.branch_name }}
      commit_sha: ${{ needs.UpdateVersionNumber.outputs.commit_sha }}

  TriggerLinuxBuild:
    needs: [check_nightly_skip, determine_branch, UpdateVersionNumber]
    if: needs.check_nightly_skip.outputs.should_skip == 'false'
    name: Trigger Linux Build (${{ matrix.environment }})
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.UpdateVersionNumber.outputs.environment) }}
    uses: ./.github/workflows/build-linux.yml
    secrets: inherit
    with:
      channel: ${{ needs.UpdateVersionNumber.outputs.release_quality }}
      build_timestamp: ${{ needs.UpdateVersionNumber.outputs.build_timestamp }}
      version: ${{ needs.UpdateVersionNumber.outputs.version }}
      release_type: ${{ needs.UpdateVersionNumber.outputs.release_type }}
      environment: ${{ matrix.environment }}
      branch_name: ${{ needs.UpdateVersionNumber.outputs.branch_name }}
      commit_sha: ${{ needs.UpdateVersionNumber.outputs.commit_sha }}

  TriggerAutocompleteBuild:
    name: Trigger Autocomplete Build
    needs: [generate_timestamp, UpdateVersionNumber, TriggerDarwinBuild, TriggerLinuxBuild]
    runs-on: ubuntu-latest
    environment: gamma
    if: |
      (github.event_name == 'schedule' || github.event.inputs.trigger_autocomplete_build != 'false') &&
      needs.TriggerDarwinBuild.result == 'success' &&
      needs.TriggerLinuxBuild.result == 'success'
    steps:
      - name: Trigger Autocomplete Workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOCOMPLETE_TRIGGER_TOKEN }}
          script: |
            const isNightly = '${{ needs.UpdateVersionNumber.outputs.release_quality }}' === 'nightly';
            const workflowId = isNightly ? 'release-nightly.yml' : 'build-kiro-cli.yml';
            const versionUpdated = '${{ needs.UpdateVersionNumber.outputs.version_updated }}' === 'true';
            
            const inputs = {
              release_quality: '${{ needs.UpdateVersionNumber.outputs.release_quality }}',
              chat_binary_commit: '${{ needs.UpdateVersionNumber.outputs.commit_sha }}',
              chat_build_timestamp: '${{ needs.generate_timestamp.outputs.build_timestamp }}',
              trigger_source: 'chat-build'
            };
            
            if (versionUpdated) {
              inputs.chat_version = '${{ needs.UpdateVersionNumber.outputs.version }}';
            }
            
            github.rest.actions.createWorkflowDispatch({
              owner: 'kiro-team',
              repo: 'kiro-cli-autocomplete',
              workflow_id: workflowId,
              ref: '${{ needs.UpdateVersionNumber.outputs.branch_name }}',
              inputs: inputs
            });

  BuildSummary:
    name: Chat Build Summary
    needs: [check_nightly_skip, generate_timestamp, UpdateVersionNumber, TriggerDarwinBuild, TriggerLinuxBuild, TriggerAutocompleteBuild]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Build Summary
        run: |
          if [[ "${{ needs.check_nightly_skip.outputs.should_skip }}" == "true" ]]; then
            echo "## ⏭️ Build Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Nightly build was skipped because the last commit was from a previous nightly build." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No new changes to build." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Chat Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Version** | ${{ needs.UpdateVersionNumber.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Commit SHA** | ${{ needs.UpdateVersionNumber.outputs.commit_sha }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Build Timestamp** | ${{ needs.generate_timestamp.outputs.build_timestamp }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Release Quality** | ${{ needs.UpdateVersionNumber.outputs.release_quality }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Release Type** | ${{ needs.UpdateVersionNumber.outputs.release_type }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Build Results" >> $GITHUB_STEP_SUMMARY
            echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Darwin | ${{ needs.TriggerDarwinBuild.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Linux | ${{ needs.TriggerLinuxBuild.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Autocomplete Trigger | ${{ needs.TriggerAutocompleteBuild.result == 'success' && '✅' || needs.TriggerAutocompleteBuild.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          fi
